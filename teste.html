<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pac-Man</title>

<style>
body {
  background: black;
  color: yellow;
  text-align: center;
  font-family: Arial, sans-serif;
}

h1 {
  margin-top: 10px;
}

#score {
  font-size: 20px;
  margin-bottom: 10px;
}

canvas {
  background: #000;
  border: 3px solid yellow;
}
</style>

</head>
<body>

<h1>Pac-Man 🟡</h1>
<div id="score">Pontuação: 0</div>

<canvas id="gameCanvas" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const tileSize = 20;

let score = 0;

let map = [
  "####################",
  "#........##........#",
  "#.####...##...####.#",
  "#..................#",
  "#.####.######.####.#",
  "#..................#",
  "#.####...##...####.#",
  "#........##........#",
  "####################"
];

let pacman = { x: 1, y: 1, dx: 0, dy: 0 };

let ghosts = [
  { x: 10, y: 5 }
];

function drawMap() {
  for (let y = 0; y < map.length; y++) {
    for (let x = 0; x < map[y].length; x++) {

      if (map[y][x] === "#") {
        ctx.fillStyle = "blue";
        ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
      }

      if (map[y][x] === ".") {
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(
          x * tileSize + tileSize / 2,
          y * tileSize + tileSize / 2,
          3,
          0,
          Math.PI * 2
        );
        ctx.fill();
      }

    }
  }
}

function drawPacman() {
  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(
    pacman.x * tileSize + tileSize / 2,
    pacman.y * tileSize + tileSize / 2,
    tileSize / 2,
    0.2 * Math.PI,
    1.8 * Math.PI
  );
  ctx.lineTo(
    pacman.x * tileSize + tileSize / 2,
    pacman.y * tileSize + tileSize / 2
  );
  ctx.fill();
}

function drawGhosts() {
  ctx.fillStyle = "red";
  ghosts.forEach(g => {
    ctx.beginPath();
    ctx.arc(
      g.x * tileSize + tileSize / 2,
      g.y * tileSize + tileSize / 2,
      tileSize / 2,
      0,
      Math.PI * 2
    );
    ctx.fill();
  });
}

function movePacman() {
  let nextX = pacman.x + pacman.dx;
  let nextY = pacman.y + pacman.dy;

  if (map[nextY][nextX] !== "#") {
    pacman.x = nextX;
    pacman.y = nextY;

    if (map[nextY][nextX] === ".") {
      map[nextY] =
        map[nextY].substring(0, nextX) +
        " " +
        map[nextY].substring(nextX + 1);

      score++;
      document.getElementById("score").innerText = "Pontuação: " + score;
    }
  }
}

function moveGhosts() {
  ghosts.forEach(g => {

    const directions = [
      { x: 1, y: 0 },
      { x: -1, y: 0 },
      { x: 0, y: 1 },
      { x: 0, y: -1 }
    ];

    let move = directions[Math.floor(Math.random() * directions.length)];

    let nextX = g.x + move.x;
    let nextY = g.y + move.y;

    if (map[nextY][nextX] !== "#") {
      g.x = nextX;
      g.y = nextY;
    }

    if (g.x === pacman.x && g.y === pacman.y) {
      alert("Game Over!");
      location.reload();
    }

  });
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") {
    pacman.dx = 0; pacman.dy = -1;
  }
  if (e.key === "ArrowDown") {
    pacman.dx = 0; pacman.dy = 1;
  }
  if (e.key === "ArrowLeft") {
    pacman.dx = -1; pacman.dy = 0;
  }
  if (e.key === "ArrowRight") {
    pacman.dx = 1; pacman.dy = 0;
  }
});

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawMap();
  drawPacman();
  drawGhosts();
  movePacman();
  moveGhosts();
}

setInterval(gameLoop, 200);
</script>

</body>
</html>
